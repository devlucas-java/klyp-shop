version: "3.9"

services:

  app:
    container_name: klyp-go-app
    build: .
    ports:
      - "8080:8080"
    environment:
      WEB_SERVER_PORT: 8080
      DB_DRIVER: postgres
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: klyp_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: super-secret-key
      JWT_EXPIRE_IN: 15
      JWT_REFRESH_EXPIRE_IN: 1440
      BTCPAY_BASE_URL: http://btcpay:14142
      BTCPAY_STORE_ID: ${BTCPAY_STORE_ID}
      BTCPAY_API_KEY: ${BTCPAY_API_KEY}
      BTCPAY_WEBHOOK_SECRET: ${BTCPAY_WEBHOOK_SECRET}
    depends_on:
      - db
      - btcpay

  db:
    container_name: klyp-go-db
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: klyp_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  btcpay:
    container_name: klyp-btcpay
    image: btcpayserver/btcpayserver:latest
    restart: always
    ports:
      - "14142:14142"
    environment:
      BTCPAY_POSTGRES: User ID=postgres;Host=db;Port=5432;Database=btcpay_db
      BTCPAY_NETWORK: regtest
      BTCPAY_BIND: 0.0.0.0:14142
      BTCPAY_ROOTPATH: /
    depends_on:
      - db
    volumes:
      - btcpay_data:/datadir

volumes:
  pgdata:
  btcpay_data:
